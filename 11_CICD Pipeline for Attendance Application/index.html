<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      background: #007bff;
      color: white;
      padding: 15px;
    }

    .container {
      margin-top: 30px;
    }

    input {
      padding: 10px;
      width: 200px;
      margin: 5px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      cursor: pointer;
      color: white;
      border-radius: 5px;
    }

    .add-btn { background: green; }
    .present-btn { background: blue; }
    .absent-btn { background: red; }

    table {
      margin: 30px auto;
      border-collapse: collapse;
      width: 60%;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
    }

    th {
      background: #007bff;
      color: white;
    }
  </style>
</head>
<body>

  <h1>📋 Attendance Management System</h1>

  <div class="container">
    <input type="text" id="studentName" placeholder="Enter Student Name">
    <button class="add-btn" onclick="addStudent()">Add Student</button>
  </div>

  <table id="attendanceTable">
    <tr>
      <th>Name</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </table>

  <script>
    function addStudent() {
      const name = document.getElementById("studentName").value;

      if (name === "") {
        alert("Please enter student name");
        return;
      }

      const table = document.getElementById("attendanceTable");

      const row = table.insertRow();

      const cell1 = row.insertCell(0);
      const cell2 = row.insertCell(1);
      const cell3 = row.insertCell(2);

      cell1.innerHTML = name;
      cell2.innerHTML = "Not Marked";

      cell3.innerHTML = `
        <button class="present-btn" onclick="markPresent(this)">Present</button>
        <button class="absent-btn" onclick="markAbsent(this)">Absent</button>
      `;

      document.getElementById("studentName").value = "";
    }

    function markPresent(btn) {
      const row = btn.parentNode.parentNode;
      row.cells[1].innerHTML = "Present";
    }

    function markAbsent(btn) {
      const row = btn.parentNode.parentNode;
      row.cells[1].innerHTML = "Absent";
    }
  </script>

</body>
</html>
